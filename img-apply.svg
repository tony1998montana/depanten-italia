<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <defs>
    <radialGradient id="aglow" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#ffcc19" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#b7064d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="askin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8b080"/>
      <stop offset="100%" stop-color="#c88050"/>
    </linearGradient>
    <linearGradient id="atube" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a0f1e"/>
      <stop offset="40%" stop-color="#4a1f3e"/>
      <stop offset="100%" stop-color="#2a0f1e"/>
    </linearGradient>
    <linearGradient id="acream" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#ffe082"/>
    </linearGradient>
    <filter id="ablur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="acreamblur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background glow -->
  <ellipse cx="140" cy="170" rx="110" ry="100" fill="url(#aglow)" filter="url(#ablur)"/>

  <!-- HAND applying cream -->
  <!-- Palm / hand -->
  <path d="M80,200 Q75,180 80,160 Q85,140 95,135 L160,130 Q175,132 180,145 L185,200 Q165,218 130,220 Q95,218 80,200 Z" fill="url(#askin)"/>

  <!-- Fingers -->
  <!-- Thumb -->
  <path d="M80,160 Q68,150 65,135 Q63,122 72,120 Q82,118 86,132 Q88,146 88,158 Z" fill="#e8b080"/>
  <!-- Index -->
  <path d="M95,135 Q93,112 97,96 Q101,82 110,84 Q119,86 117,102 Q115,118 110,132 Z" fill="#dda070"/>
  <!-- Middle -->
  <path d="M112,132 Q110,108 114,92 Q118,76 128,78 Q138,80 136,96 Q134,112 130,128 Z" fill="#e8b080"/>
  <!-- Ring (holding tube) -->
  <path d="M130,130 Q130,108 134,93 Q138,78 147,80 Q156,82 154,98 Q152,113 148,128 Z" fill="#dda070"/>
  <!-- Little -->
  <path d="M148,130 Q149,112 152,99 Q156,86 163,88 Q170,90 168,103 Q166,116 162,128 Z" fill="#e8b080"/>

  <!-- CREAM TUBE being held -->
  <rect x="148" y="58" width="36" height="78" rx="10" fill="url(#atube)"/>
  <rect x="151" y="60" width="30" height="74" rx="8" fill="none" stroke="#b7064d" stroke-width="1.5"/>
  <!-- Tube label -->
  <rect x="153" y="75" width="26" height="32" rx="4" fill="rgba(183,6,77,0.8)"/>
  <text x="166" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#ffcc19">DEPANTEN</text>
  <text x="166" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#fff">crema</text>
  <!-- Tube cap -->
  <rect x="154" y="50" width="24" height="14" rx="5" fill="#b7064d"/>
  <!-- Tube opening/nozzle -->
  <ellipse cx="166" cy="50" rx="5" ry="3" fill="#ffcc19"/>

  <!-- Cream coming out -->
  <path d="M166,50 Q160,40 150,30 Q140,22 128,20 Q118,20 110,26" stroke="url(#acream)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M166,50 Q160,40 150,30 Q140,22 128,20 Q118,20 110,26" stroke="url(#acream)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5" filter="url(#acreamblur)"/>

  <!-- Cream on knee area being applied -->
  <ellipse cx="120" cy="175" rx="35" ry="22" fill="#ffe082" opacity="0.35" filter="url(#acreamblur)"/>
  <ellipse cx="120" cy="175" rx="22" ry="14" fill="#fff8e1" opacity="0.5"/>

  <!-- Sparkle/healing effect -->
  <g opacity="0.9">
    <polygon points="65,95 67,101 73,101 68,105 70,111 65,107 60,111 62,105 57,101 63,101" fill="#ffcc19" transform="scale(0.7)"/>
    <polygon points="65,95 67,101 73,101 68,105 70,111 65,107 60,111 62,105 57,101 63,101" fill="#4dff91" transform="translate(160,50) scale(0.5)"/>
    <polygon points="65,95 67,101 73,101 68,105 70,111 65,107 60,111 62,105 57,101 63,101" fill="#ffcc19" transform="translate(-20,120) scale(0.45)"/>
  </g>

  <!-- "+" healing particles -->
  <g fill="#4dff91" opacity="0.8" font-family="Arial" font-size="18" font-weight="bold">
    <text x="38" y="145">+</text>
    <text x="210" y="100">+</text>
    <text x="228" y="140">+</text>
  </g>

  <!-- Label -->
  <rect x="20" y="270" width="220" height="34" rx="8" fill="rgba(183,6,77,0.85)"/>
  <text x="130" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Applicazione Depanten</text>
</svg>
