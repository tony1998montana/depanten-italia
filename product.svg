<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <!-- Tube body -->
  <rect x="55" y="60" width="90" height="185" rx="12" fill="url(#tubeGrad)"/>
  <!-- Tube cap -->
  <rect x="65" y="30" width="70" height="38" rx="8" fill="url(#capGrad)"/>
  <!-- Cap top nozzle -->
  <rect x="82" y="14" width="36" height="20" rx="6" fill="#ffcc19"/>
  <!-- Shine on cap -->
  <rect x="72" y="36" width="8" height="24" rx="4" fill="rgba(255,255,255,0.25)"/>

  <!-- Label background -->
  <rect x="58" y="80" width="84" height="140" rx="6" fill="url(#labelGrad)"/>

  <!-- DEPANTEN text -->
  <text x="100" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#ffcc19" letter-spacing="1">DEPANTEN</text>

  <!-- Subtitle -->
  <text x="100" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.85)" letter-spacing="0.5">CREMA ARTICOLAZIONI</text>

  <!-- Divider line -->
  <line x1="66" y1="140" x2="134" y2="140" stroke="rgba(255,204,25,0.4)" stroke-width="1"/>

  <!-- Leaf icon -->
  <ellipse cx="88" cy="158" rx="10" ry="6" fill="#2d9e50" transform="rotate(-30 88 158)"/>
  <ellipse cx="112" cy="158" rx="10" ry="6" fill="#2d9e50" transform="rotate(30 112 158)"/>
  <line x1="100" y1="148" x2="100" y2="170" stroke="#2d9e50" stroke-width="1.5"/>

  <!-- 100% Natural -->
  <text x="100" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.7)">100% NATURALE</text>

  <!-- Volume -->
  <text x="100" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">75 ml</text>

  <!-- Shine on tube -->
  <rect x="60" y="65" width="10" height="170" rx="5" fill="rgba(255,255,255,0.08)"/>

  <!-- Bottom of tube (rounded) -->
  <ellipse cx="100" cy="243" rx="45" ry="8" fill="url(#bottomGrad)"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="tubeGrad" x1="55" y1="0" x2="145" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3d1830"/>
      <stop offset="30%" stop-color="#5a2248"/>
      <stop offset="70%" stop-color="#4a1a3a"/>
      <stop offset="100%" stop-color="#2a0f1e"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="65" y1="0" x2="135" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b7064d"/>
      <stop offset="50%" stop-color="#d4085a"/>
      <stop offset="100%" stop-color="#8a0438"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0" y1="80" x2="0" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4d1a3e"/>
      <stop offset="100%" stop-color="#2a0f1e"/>
    </linearGradient>
    <linearGradient id="bottomGrad" x1="55" y1="0" x2="145" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a0f1e"/>
      <stop offset="50%" stop-color="#4a1a3a"/>
      <stop offset="100%" stop-color="#2a0f1e"/>
    </linearGradient>
  </defs>
</svg>
