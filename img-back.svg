<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <defs>
    <radialGradient id="bglow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#b7064d" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#b7064d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bskin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d49060"/>
      <stop offset="40%" stop-color="#e8b080"/>
      <stop offset="100%" stop-color="#d49060"/>
    </linearGradient>
    <linearGradient id="bspine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8fb3cc"/>
      <stop offset="50%" stop-color="#b0cce0"/>
      <stop offset="100%" stop-color="#8fb3cc"/>
    </linearGradient>
    <filter id="bblur">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Glow -->
  <ellipse cx="140" cy="180" rx="90" ry="100" fill="url(#bglow)" filter="url(#bblur)"/>

  <!-- Body silhouette (back view) -->
  <path d="M100,40 Q140,30 180,40 L195,120 Q175,130 140,132 Q105,130 85,120 Z" fill="url(#bskin)" opacity="0.85"/>
  <!-- Lower back -->
  <path d="M90,125 Q110,120 140,118 Q170,120 190,125 L188,240 Q170,250 140,252 Q110,250 92,240 Z" fill="url(#bskin)" opacity="0.85"/>
  <!-- Shoulders -->
  <ellipse cx="88" cy="70" rx="28" ry="18" fill="#d49060" opacity="0.85"/>
  <ellipse cx="192" cy="70" rx="28" ry="18" fill="#d49060" opacity="0.85"/>
  <!-- Neck -->
  <rect x="125" y="20" width="30" height="30" rx="8" fill="#e8b080" opacity="0.85"/>
  <!-- Head -->
  <ellipse cx="140" cy="14" rx="22" ry="18" fill="#e8b080" opacity="0.85"/>

  <!-- Spine vertebrae -->
  <g fill="url(#bspine)" stroke="#7fa0b8" stroke-width="0.5">
    <rect x="132" y="50" width="16" height="11" rx="3"/>
    <rect x="132" y="65" width="16" height="11" rx="3"/>
    <rect x="132" y="80" width="16" height="11" rx="3"/>
    <rect x="132" y="95" width="16" height="11" rx="3"/>
    <rect x="132" y="110" width="16" height="11" rx="3"/>
    <!-- Lumbar (highlighted as painful) -->
    <rect x="130" y="127" width="20" height="13" rx="3" fill="#e74c3c" stroke="#c0392b"/>
    <rect x="130" y="144" width="20" height="13" rx="3" fill="#e74c3c" stroke="#c0392b"/>
    <rect x="130" y="161" width="20" height="13" rx="3" fill="#c0392b" stroke="#a93226"/>
    <rect x="132" y="178" width="16" height="11" rx="3" fill="url(#bspine)"/>
    <rect x="132" y="193" width="16" height="11" rx="3" fill="url(#bspine)"/>
  </g>

  <!-- Pain burst at lumbar -->
  <ellipse cx="140" cy="158" rx="30" ry="22" fill="#ff4444" opacity="0.3" filter="url(#bblur)"/>

  <!-- Pain lines -->
  <g stroke="#ff6b6b" stroke-width="2.5" opacity="0.8" stroke-linecap="round">
    <line x1="175" y1="135" x2="200" y2="125"/>
    <line x1="178" y1="150" x2="205" y2="152"/>
    <line x1="175" y1="165" x2="198" y2="172"/>
  </g>

  <!-- Star burst pain icon -->
  <g transform="translate(205,145) scale(0.9)" fill="#ffcc19" opacity="0.95">
    <polygon points="0,-12 2.8,-3.8 11.4,-3.7 4.7,1.5 7.2,9.7 0,4.5 -7.2,9.7 -4.7,1.5 -11.4,-3.7 -2.8,-3.8"/>
  </g>

  <!-- Muscle lines on back -->
  <path d="M110,60 Q120,100 115,190" stroke="#c07845" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M165,60 Q160,100 166,190" stroke="#c07845" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Label -->
  <rect x="30" y="268" width="180" height="34" rx="8" fill="rgba(183,6,77,0.85)"/>
  <text x="120" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Dolore alla Schiena</text>
</svg>
