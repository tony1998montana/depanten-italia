<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <defs>
    <radialGradient id="kglow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#b7064d" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b7064d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kleg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5c8a0"/>
      <stop offset="50%" stop-color="#e8b080"/>
      <stop offset="100%" stop-color="#d49060"/>
    </linearGradient>
    <linearGradient id="kjoint" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c0392b" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#e74c3c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="kblur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background glow -->
  <ellipse cx="140" cy="180" rx="100" ry="80" fill="url(#kglow)" filter="url(#kblur)"/>

  <!-- Upper leg (femur area) -->
  <path d="M95,30 Q100,20 140,18 Q180,20 185,30 L190,160 Q170,170 140,172 Q110,170 90,160 Z" fill="url(#kleg)" opacity="0.9"/>

  <!-- Lower leg (tibia area) -->
  <path d="M90,200 Q110,192 140,190 Q170,192 190,200 L188,290 Q170,300 140,302 Q110,300 92,290 Z" fill="url(#kleg)" opacity="0.9"/>

  <!-- Kneecap (patella) -->
  <ellipse cx="140" cy="182" rx="42" ry="30" fill="#d4956a" stroke="#c07845" stroke-width="1.5"/>
  <ellipse cx="140" cy="182" rx="34" ry="24" fill="#e8a87a"/>

  <!-- Joint inflammation glow -->
  <ellipse cx="140" cy="182" rx="55" ry="40" fill="url(#kjoint)" opacity="0.6" filter="url(#kblur)"/>

  <!-- Pain sparkles -->
  <g fill="#ffcc19" opacity="0.9">
    <polygon points="200,145 203,155 213,155 205,161 208,171 200,165 192,171 195,161 187,155 197,155" transform="scale(0.7) translate(90,60)"/>
    <polygon points="200,145 203,155 213,155 205,161 208,171 200,165 192,171 195,161 187,155 197,155" transform="scale(0.5) translate(20,160)"/>
  </g>

  <!-- Pain lines -->
  <g stroke="#ff6b6b" stroke-width="2" opacity="0.7" stroke-linecap="round">
    <line x1="195" y1="165" x2="215" y2="155"/>
    <line x1="197" y1="175" x2="220" y2="178"/>
    <line x1="193" y1="185" x2="215" y2="195"/>
  </g>

  <!-- Cartilage lines -->
  <path d="M98,168 Q140,162 182,168" stroke="#b7c4cf" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M98,196 Q140,202 182,196" stroke="#b7c4cf" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Label -->
  <rect x="30" y="265" width="160" height="34" rx="8" fill="rgba(183,6,77,0.85)"/>
  <text x="110" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Dolore al Ginocchio</text>
</svg>
